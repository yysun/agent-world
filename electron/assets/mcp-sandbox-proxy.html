<!DOCTYPE html>
<!--
  MCP App Sandbox Proxy

  Purpose:
  - Outer iframe that bridges postMessage communication between the host (agent-world)
    and the untrusted inner iframe containing the MCP App HTML.

  Key Features:
  - Relays all JSON-RPC messages bidirectionally between host and inner iframe.
  - Intercepts ui/notifications/sandbox-resource-ready to create the inner iframe with
    the HTML bundle, CSP meta tag, and permission allow attribute.
  - Sends ui/notifications/sandbox-proxy-ready to the host on load.
  - Validates message origin before processing: host messages must come from parent,
    app messages must come from the inner iframe.

  Implementation Notes:
  - Uses postMessage with targetOrigin='*' for host messages (host validates source).
  - The inner iframe uses srcdoc so its origin is opaque (null); validation uses
    event.source === innerIframe.contentWindow.
  - No external scripts; fully self-contained for security.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; }
    iframe { border: none; width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
<script>
(function () {
  'use strict';

  var SANDBOX_PROXY_READY = 'ui/notifications/sandbox-proxy-ready';
  var SANDBOX_RESOURCE_READY = 'ui/notifications/sandbox-resource-ready';

  var innerFrame = null;

  function injectCsp(html, csp) {
    if (!csp) return html;
    var directives = [];
    if (csp.defaultSrc) directives.push("default-src " + csp.defaultSrc.join(' '));
    if (csp.scriptSrc) directives.push("script-src " + csp.scriptSrc.join(' '));
    if (csp.styleSrc) directives.push("style-src " + csp.styleSrc.join(' '));
    if (csp.imgSrc) directives.push("img-src " + csp.imgSrc.join(' '));
    if (csp.connectSrc) directives.push("connect-src " + csp.connectSrc.join(' '));
    if (csp.fontSrc) directives.push("font-src " + csp.fontSrc.join(' '));
    if (csp.mediaSrc) directives.push("media-src " + csp.mediaSrc.join(' '));
    if (csp.frameSrc) directives.push("frame-src " + csp.frameSrc.join(' '));
    if (directives.length === 0) return html;
    var cspContent = directives.join('; ');
    var metaTag = '<meta http-equiv="Content-Security-Policy" content="' + cspContent.replace(/"/g, '&quot;') + '">';
    return html.replace(/(<head[^>]*>)/i, '$1' + metaTag) || (metaTag + html);
  }

  function buildAllowAttr(permissions) {
    if (!permissions) return '';
    var parts = [];
    var map = {
      microphone: 'microphone',
      camera: 'camera',
      geolocation: 'geolocation',
      clipboardRead: 'clipboard-read',
      clipboardWrite: 'clipboard-write',
      fullscreen: 'fullscreen',
    };
    Object.keys(permissions).forEach(function (key) {
      if (permissions[key] && map[key]) parts.push(map[key]);
    });
    return parts.join('; ');
  }

  function createInnerFrame(html, csp, permissions, sandbox) {
    var frame = document.createElement('iframe');
    frame.setAttribute(
      'sandbox',
      sandbox || 'allow-scripts allow-forms allow-popups allow-downloads'
    );
    var allow = buildAllowAttr(permissions);
    if (allow) frame.setAttribute('allow', allow);
    frame.srcdoc = injectCsp(html, csp);
    document.body.appendChild(frame);
    return frame;
  }

  // Listen for messages from both the host (parent) and the inner iframe.
  window.addEventListener('message', function (event) {
    var data = event.data;
    if (!data || typeof data !== 'object') return;

    // Message from host (parent) → relay to inner frame, or handle resource-ready.
    if (event.source === window.parent) {
      var method = data.method || (data.params && data.params.method);
      // Detect sandbox-resource-ready by the notification method field.
      var isResourceReady = (data.method === SANDBOX_RESOURCE_READY) ||
        (data.params && data.params.method === SANDBOX_RESOURCE_READY);

      // Try to unwrap MCP JSON-RPC notification wrapper.
      var notifMethod = data.method;
      var notifParams = data.params || {};

      if (notifMethod === SANDBOX_RESOURCE_READY) {
        // Create the inner iframe with the provided HTML.
        innerFrame = createInnerFrame(
          notifParams.html || '',
          notifParams.csp,
          notifParams.permissions,
          notifParams.sandbox
        );
        return;
      }

      // Relay all other host messages to the inner iframe.
      if (innerFrame && innerFrame.contentWindow) {
        innerFrame.contentWindow.postMessage(data, '*');
      }
      return;
    }

    // Message from inner iframe → relay to host (parent).
    if (innerFrame && event.source === innerFrame.contentWindow) {
      window.parent.postMessage(data, '*');
      return;
    }
  });

  // Signal to the host that this proxy is ready.
  // Use a small delay to ensure the host has set up its message listener.
  function signalReady() {
    window.parent.postMessage({
      jsonrpc: '2.0',
      method: SANDBOX_PROXY_READY,
      params: {}
    }, '*');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', signalReady);
  } else {
    signalReady();
  }
})();
</script>
</body>
</html>
